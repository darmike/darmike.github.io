<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Crypto Backtest">
    <meta name="theme-color" content="#0f172a">
    <meta name="description" content="Профессиональный анализ крипто-торговых стратегий с глубокой аналитикой">
    
    <!-- iOS icons -->
    <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'><rect fill='%233b82f6' width='180' height='180'/><text x='50%' y='50%' font-size='80' font-weight='bold' fill='white' text-anchor='middle' dominant-baseline='central'>◆</text></svg>">
    
    <!-- PWA Manifest -->
    <link rel="manifest" href="manifest.json">
    
    <!-- Styles -->
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            -webkit-touch-callout: none;
        }

        body {
            background: #0f172a;
            color: #e2e8f0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
            line-height: 1.6;
            overflow-x: hidden;
            position: fixed;
            width: 100%;
            height: 100vh;
        }

        html {
            background: #0f172a;
        }

        #root {
            width: 100%;
            height: 100vh;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
            padding-top: max(0px, env(safe-area-inset-top));
            padding-bottom: max(20px, env(safe-area-inset-bottom));
            padding-left: max(0px, env(safe-area-inset-left));
            padding-right: max(0px, env(safe-area-inset-right));
        }

        input, select, button {
            font-family: inherit;
            font-size: 16px;
            -webkit-appearance: none;
            appearance: none;
            border-radius: 0;
        }

        input[type="text"],
        input[type="number"],
        select {
            border-radius: 6px;
        }

        button {
            border-radius: 6px;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <!-- React & Recharts from CDN -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/recharts@2.10.3/dist/Recharts.js"></script>

    <!-- App Component -->
    <script>
        const { useState, useEffect } = React;
        const { LineChart, Line, BarChart, Bar, XAxis, YAxis, CartesianGrid, Tooltip, Legend, ResponsiveContainer, Area, AreaChart } = window.Recharts;

        function CryptoBacktestPro() {
            const [data, setData] = useState([]);
            const [strategy, setStrategy] = useState('rsi_macd');
            const [results, setResults] = useState(null);
            const [loading, setLoading] = useState(false);
            const [selectedPeriod, setSelectedPeriod] = useState('180');

            useEffect(() => {
                fetchBTCData();
            }, []);

            const fetchBTCData = async () => {
                setLoading(true);
                try {
                    const mockData = generateRealisticBTCData(parseInt(selectedPeriod));
                    setData(mockData);
                    if (results) {
                        runBacktest(mockData, strategy);
                    }
                } finally {
                    setLoading(false);
                }
            };

            const generateRealisticBTCData = (days) => {
                const data = [];
                let price = 62000;
                let date = new Date();
                date.setDate(date.getDate() - days);

                for (let i = 0; i < days; i++) {
                    const dailyChange = (Math.random() - 0.48) * 2000;
                    const volatility = Math.sin(i / 20) * 500;
                    price = Math.max(price + dailyChange + volatility, 45000);

                    const open = price + (Math.random() - 0.5) * 1000;
                    const high = Math.max(open, price) + Math.abs(Math.random() - 0.5) * 1500;
                    const low = Math.min(open, price) - Math.abs(Math.random() - 0.5) * 1500;
                    const close = open + (Math.random() - 0.5) * 1500;
                    const volume = Math.random() * 50000000000;

                    data.push({
                        date: new Date(date).toISOString().split('T')[0],
                        open: Math.round(open),
                        high: Math.round(high),
                        low: Math.round(low),
                        close: Math.round(close),
                        volume: Math.round(volume),
                    });

                    date.setDate(date.getDate() + 1);
                }

                return data;
            };

            const calculateIndicators = (prices) => {
                return prices.map((_, i) => {
                    const indicators = {};
                    indicators.sma20 = calculateSMA(prices, i, 20);
                    indicators.sma50 = calculateSMA(prices, i, 50);
                    indicators.sma200 = calculateSMA(prices, i, 200);
                    indicators.rsi = calculateRSI(prices, i, 14);

                    const macd = calculateMACD(prices, i);
                    indicators.macd = macd.macd;
                    indicators.signal = macd.signal;
                    indicators.histogram = macd.histogram;

                    const bb = calculateBollingerBands(prices, i, 20, 2);
                    indicators.bbUpper = bb.upper;
                    indicators.bbMiddle = bb.middle;
                    indicators.bbLower = bb.lower;

                    indicators.atr = calculateATR(prices, i, 14);

                    return indicators;
                });
            };

            const calculateSMA = (prices, index, period) => {
                if (index < period - 1) return null;
                let sum = 0;
                for (let i = index - period + 1; i <= index; i++) {
                    sum += prices[i].close;
                }
                return sum / period;
            };

            const calculateRSI = (prices, index, period) => {
                if (index < period) return 50;
                let gains = 0, losses = 0;
                for (let i = index - period + 1; i <= index; i++) {
                    const change = prices[i].close - prices[i - 1].close;
                    if (change > 0) gains += change;
                    else losses -= change;
                }
                const avgGain = gains / period;
                const avgLoss = losses / period;
                const rs = avgLoss === 0 ? 100 : avgGain / avgLoss;
                return 100 - (100 / (1 + rs));
            };

            const calculateMACD = (prices, index) => {
                const ema12 = calculateEMA(prices, index, 12);
                const ema26 = calculateEMA(prices, index, 26);
                const macd = ema12 - ema26;
                const signal = macd;
                return {
                    macd: macd,
                    signal: signal,
                    histogram: macd - signal
                };
            };

            const calculateEMA = (prices, index, period) => {
                if (index < period - 1) return prices[index].close;
                const multiplier = 2 / (period + 1);
                let ema = 0;
                for (let i = index - period + 1; i <= index; i++) {
                    ema = prices[i].close * multiplier + ema * (1 - multiplier);
                }
                return ema;
            };

            const calculateBollingerBands = (prices, index, period, stdDev) => {
                if (index < period - 1) return { upper: null, middle: null, lower: null };
                const sma = calculateSMA(prices, index, period);
                let sumSquares = 0;
                for (let i = index - period + 1; i <= index; i++) {
                    sumSquares += Math.pow(prices[i].close - sma, 2);
                }
                const std = Math.sqrt(sumSquares / period);
                return {
                    upper: sma + (std * stdDev),
                    middle: sma,
                    lower: sma - (std * stdDev)
                };
            };

            const calculateATR = (prices, index, period) => {
                if (index < period - 1) return 0;
                let sumTR = 0;
                for (let i = index - period + 1; i <= index; i++) {
                    const tr = Math.max(
                        prices[i].high - prices[i].low,
                        Math.abs(prices[i].high - prices[i - 1].close),
                        Math.abs(prices[i].low - prices[i - 1].close)
                    );
                    sumTR += tr;
                }
                return sumTR / period;
            };

            const runBacktest = (priceData, strategyName) => {
                const indicators = calculateIndicators(priceData);
                let position = null;
                let trades = [];
                let equity = 10000;
                const trades_list = [];

                for (let i = 200; i < priceData.length; i++) {
                    const price = priceData[i].close;
                    const ind = indicators[i];

                    let signal = null;

                    if (strategyName === 'rsi_macd') {
                        if (!position && ind.rsi < 30 && ind.macd > ind.signal) {
                            signal = 'BUY';
                        } else if (position && ind.rsi > 70 && ind.macd < ind.signal) {
                            signal = 'SELL';
                        }
                    } else if (strategyName === 'sma_crossover') {
                        if (!position && ind.sma20 > ind.sma50) {
                            signal = 'BUY';
                        } else if (position && ind.sma20 < ind.sma50) {
                            signal = 'SELL';
                        }
                    } else if (strategyName === 'bollinger_squeeze') {
                        if (!position && price < ind.bbLower) {
                            signal = 'BUY';
                        } else if (position && price > ind.bbUpper) {
                            signal = 'SELL';
                        }
                    }

                    if (signal === 'BUY' && !position) {
                        position = {
                            entry: price,
                            date: priceData[i].date,
                            quantity: equity / price
                        };
                    } else if (signal === 'SELL' && position) {
                        const exit_price = price;
                        const pnl = (exit_price - position.entry) * position.quantity;
                        const pnl_percent = ((exit_price - position.entry) / position.entry) * 100;
                        equity += pnl;

                        trades_list.push({
                            entry: position.entry,
                            exit: exit_price,
                            entry_date: position.date,
                            exit_date: priceData[i].date,
                            pnl: pnl,
                            pnl_percent: pnl_percent,
                            profitable: pnl > 0
                        });

                        position = null;
                    }

                    trades.push({
                        date: priceData[i].date,
                        close: price,
                        position: position ? 'LONG' : 'FLAT',
                        equity: equity,
                        rsi: Math.round(ind.rsi * 100) / 100,
                        macd: Math.round(ind.macd * 100) / 100
                    });
                }

                const metrics = calculateMetrics(trades_list, equity, priceData);
                setResults({
                    trades: trades_list,
                    equity: equity,
                    metrics: metrics,
                    chart_data: trades
                });
            };

            const calculateMetrics = (trades, final_equity, prices) => {
                if (trades.length === 0) {
                    return {
                        totalReturn: 0,
                        totalTrades: 0,
                        winRate: 0,
                        avgWin: 0,
                        avgLoss: 0,
                        profitFactor: 0,
                        sharpeRatio: 0,
                        maxDrawdown: 0
                    };
                }

                const totalReturn = ((final_equity - 10000) / 10000) * 100;
                const profitable = trades.filter(t => t.profitable).length;
                const winRate = (profitable / trades.length) * 100;

                const wins = trades.filter(t => t.profitable);
                const losses = trades.filter(t => !t.profitable);

                const avgWin = wins.length > 0 ? wins.reduce((a, b) => a + b.pnl, 0) / wins.length : 0;
                const avgLoss = losses.length > 0 ? losses.reduce((a, b) => a + b.pnl, 0) / losses.length : 0;
                const profitFactor = Math.abs(avgLoss) === 0 ? 0 : Math.abs((avgWin * wins.length) / (avgLoss * losses.length));

                const returns = trades.map(t => t.pnl_percent);
                const avgReturn = returns.reduce((a, b) => a + b, 0) / returns.length;
                const stdDev = Math.sqrt(returns.reduce((a, b) => a + Math.pow(b - avgReturn, 2), 0) / returns.length);
                const sharpeRatio = stdDev === 0 ? 0 : (avgReturn / stdDev) * Math.sqrt(252);

                let maxDrawdown = 0;
                let peak = 10000;
                for (let equity of prices.map(p => 10000 * (p.close / prices[0].close))) {
                    if (equity > peak) peak = equity;
                    const dd = ((equity - peak) / peak) * 100;
                    if (dd < maxDrawdown) maxDrawdown = dd;
                }

                return {
                    totalReturn: totalReturn.toFixed(2),
                    totalTrades: trades.length,
                    winRate: winRate.toFixed(2),
                    avgWin: avgWin.toFixed(2),
                    avgLoss: avgLoss.toFixed(2),
                    profitFactor: profitFactor.toFixed(2),
                    sharpeRatio: sharpeRatio.toFixed(2),
                    maxDrawdown: maxDrawdown.toFixed(2)
                };
            };

            const handleRunBacktest = () => {
                if (data.length > 0) {
                    runBacktest(data, strategy);
                }
            };

            return React.createElement('div', {
                style: {
                    background: '#0f172a',
                    color: '#e2e8f0',
                    minHeight: '100vh',
                    padding: '1rem',
                    fontFamily: 'system-ui'
                }
            },
                React.createElement('div', {
                    style: {
                        maxWidth: '1200px',
                        margin: '0 auto'
                    }
                },
                    // Header
                    React.createElement('div', {
                        style: {
                            marginBottom: '2rem',
                            borderBottom: '1px solid #334155',
                            paddingBottom: '1.5rem'
                        }
                    },
                        React.createElement('h1', {
                            style: {
                                fontSize: '1.75rem',
                                fontWeight: '700',
                                margin: '0 0 0.5rem 0',
                                color: '#f1f5f9'
                            }
                        }, '◆ CRYPTO BACKTEST'),
                        React.createElement('p', {
                            style: {
                                margin: '0.5rem 0 0 0',
                                color: '#94a3b8',
                                fontSize: '0.85rem'
                            }
                        }, 'Аналіз крипто-стратегій')
                    ),

                    // Controls
                    React.createElement('div', {
                        style: {
                            display: 'grid',
                            gridTemplateColumns: 'window.innerWidth < 640 ? "1fr" : "1fr 1fr 1fr auto"',
                            gap: '0.75rem',
                            marginBottom: '1.5rem',
                            padding: '1rem',
                            background: '#1e293b',
                            borderRadius: '0.5rem',
                            border: '1px solid #334155'
                        }
                    },
                        React.createElement('div', null,
                            React.createElement('label', {
                                style: {
                                    display: 'block',
                                    fontSize: '0.75rem',
                                    fontWeight: '600',
                                    marginBottom: '0.5rem',
                                    color: '#cbd5e1'
                                }
                            }, 'Стратегія'),
                            React.createElement('select', {
                                value: strategy,
                                onChange: (e) => setStrategy(e.target.value),
                                style: {
                                    width: '100%',
                                    padding: '0.75rem',
                                    background: '#0f172a',
                                    border: '1px solid #475569',
                                    borderRadius: '0.35rem',
                                    color: '#e2e8f0',
                                    fontSize: '0.85rem'
                                }
                            },
                                React.createElement('option', { value: 'rsi_macd' }, 'RSI + MACD'),
                                React.createElement('option', { value: 'sma_crossover' }, 'SMA Crossover'),
                                React.createElement('option', { value: 'bollinger_squeeze' }, 'Bollinger Bands')
                            )
                        ),
                        React.createElement('div', null,
                            React.createElement('label', {
                                style: {
                                    display: 'block',
                                    fontSize: '0.75rem',
                                    fontWeight: '600',
                                    marginBottom: '0.5rem',
                                    color: '#cbd5e1'
                                }
                            }, 'Період'),
                            React.createElement('select', {
                                value: selectedPeriod,
                                onChange: (e) => setSelectedPeriod(e.target.value),
                                style: {
                                    width: '100%',
                                    padding: '0.75rem',
                                    background: '#0f172a',
                                    border: '1px solid #475569',
                                    borderRadius: '0.35rem',
                                    color: '#e2e8f0',
                                    fontSize: '0.85rem'
                                }
                            },
                                React.createElement('option', { value: '30' }, '1 м-ць'),
                                React.createElement('option', { value: '90' }, '3 м-ці'),
                                React.createElement('option', { value: '180' }, '6 м-ців'),
                                React.createElement('option', { value: '365' }, '1 рік')
                            )
                        ),
                        React.createElement('button', {
                            onClick: () => { fetchBTCData(); handleRunBacktest(); },
                            disabled: loading,
                            style: {
                                gridColumn: 'window.innerWidth < 640 ? "auto" : "3"',
                                padding: '0.75rem 1rem',
                                background: loading ? '#475569' : '#3b82f6',
                                color: '#fff',
                                border: 'none',
                                borderRadius: '0.35rem',
                                fontWeight: '600',
                                cursor: loading ? 'not-allowed' : 'pointer',
                                fontSize: '0.85rem'
                            }
                        }, loading ? 'Завантаження...' : 'Запустити')
                    ),

                    // Results
                    results && React.createElement('div', null,
                        // Metrics
                        React.createElement('div', {
                            style: {
                                display: 'grid',
                                gridTemplateColumns: 'repeat(auto-fit, minmax(150px, 1fr))',
                                gap: '0.75rem',
                                marginBottom: '1.5rem'
                            }
                        },
                            [
                                { label: 'Дохід', value: results.metrics.totalReturn + '%', color: results.metrics.totalReturn > 0 ? '#10b981' : '#ef4444' },
                                { label: 'Win Rate', value: results.metrics.winRate + '%', color: '#f59e0b' },
                                { label: 'Profit F.', value: results.metrics.profitFactor, color: '#8b5cf6' },
                                { label: 'Sharpe', value: results.metrics.sharpeRatio, color: '#06b6d4' }
                            ].map((m, i) =>
                                React.createElement('div', {
                                    key: i,
                                    style: {
                                        background: '#1e293b',
                                        padding: '1rem',
                                        borderRadius: '0.5rem',
                                        border: '1px solid #334155'
                                    }
                                },
                                    React.createElement('div', {
                                        style: {
                                            fontSize: '0.7rem',
                                            color: '#94a3b8',
                                            fontWeight: '600',
                                            marginBottom: '0.5rem'
                                        }
                                    }, m.label),
                                    React.createElement('div', {
                                        style: {
                                            fontSize: '1.5rem',
                                            fontWeight: '700',
                                            color: m.color
                                        }
                                    }, m.value)
                                )
                            )
                        ),

                        // Details
                        React.createElement('div', {
                            style: {
                                background: '#1e293b',
                                padding: '1rem',
                                borderRadius: '0.5rem',
                                border: '1px solid #334155',
                                marginBottom: '1.5rem'
                            }
                        },
                            React.createElement('h3', {
                                style: {
                                    margin: '0 0 1rem 0',
                                    fontSize: '0.95rem',
                                    fontWeight: '600'
                                }
                            }, 'Статистика'),
                            React.createElement('div', {
                                style: {
                                    display: 'grid',
                                    gridTemplateColumns: '1fr 1fr',
                                    gap: '0.75rem',
                                    fontSize: '0.85rem'
                                }
                            },
                                React.createElement('div', null,
                                    React.createElement('span', { style: { color: '#94a3b8' } }, 'Сделки: '),
                                    React.createElement('span', { style: { color: '#e2e8f0', fontWeight: '600' } }, results.metrics.totalTrades)
                                ),
                                React.createElement('div', null,
                                    React.createElement('span', { style: { color: '#94a3b8' } }, 'Прибильних: '),
                                    React.createElement('span', { style: { color: '#10b981', fontWeight: '600' } }, Math.round(results.metrics.totalTrades * results.metrics.winRate / 100))
                                ),
                                React.createElement('div', null,
                                    React.createElement('span', { style: { color: '#94a3b8' } }, 'Капітал: '),
                                    React.createElement('span', { style: { color: results.equity > 10000 ? '#10b981' : '#ef4444', fontWeight: '600' } }, '$' + Math.round(results.equity))
                                ),
                                React.createElement('div', null,
                                    React.createElement('span', { style: { color: '#94a3b8' } }, 'Max DD: '),
                                    React.createElement('span', { style: { color: '#ef4444', fontWeight: '600' } }, results.metrics.maxDrawdown + '%')
                                )
                            )
                        ),

                        // Top Trades
                        React.createElement('div', {
                            style: {
                                background: '#1e293b',
                                padding: '1rem',
                                borderRadius: '0.5rem',
                                border: '1px solid #334155'
                            }
                        },
                            React.createElement('h3', {
                                style: {
                                    margin: '0 0 1rem 0',
                                    fontSize: '0.95rem',
                                    fontWeight: '600'
                                }
                            }, 'ТОП-5 Сделок'),
                            React.createElement('div', {
                                style: { overflowX: 'auto', fontSize: '0.8rem' }
                            },
                                React.createElement('table', {
                                    style: {
                                        width: '100%',
                                        borderCollapse: 'collapse'
                                    }
                                },
                                    React.createElement('thead', null,
                                        React.createElement('tr', { style: { borderBottom: '1px solid #334155' } },
                                            React.createElement('th', { style: { padding: '0.5rem', textAlign: 'left', color: '#cbd5e1' } }, 'Вхід'),
                                            React.createElement('th', { style: { padding: '0.5rem', textAlign: 'left', color: '#cbd5e1' } }, 'Выхід'),
                                            React.createElement('th', { style: { padding: '0.5rem', textAlign: 'left', color: '#cbd5e1' } }, 'P&L'),
                                            React.createElement('th', { style: { padding: '0.5rem', textAlign: 'left', color: '#cbd5e1' } }, '%')
                                        )
                                    ),
                                    React.createElement('tbody', null,
                                        results.trades.sort((a, b) => b.pnl - a.pnl).slice(0, 5).map((trade, i) =>
                                            React.createElement('tr', {
                                                key: i,
                                                style: { borderBottom: '1px solid #1e293b' }
                                            },
                                                React.createElement('td', { style: { padding: '0.5rem', color: '#cbd5e1' } }, '$' + Math.round(trade.entry)),
                                                React.createElement('td', { style: { padding: '0.5rem', color: '#cbd5e1' } }, '$' + Math.round(trade.exit)),
                                                React.createElement('td', { style: { padding: '0.5rem', color: trade.pnl > 0 ? '#10b981' : '#ef4444', fontWeight: '600' } }, '$' + Math.round(trade.pnl)),
                                                React.createElement('td', { style: { padding: '0.5rem', color: trade.pnl_percent > 0 ? '#10b981' : '#ef4444', fontWeight: '600' } }, trade.pnl_percent.toFixed(1) + '%')
                                            )
                                        )
                                    )
                                )
                            )
                        )
                    ),

                    // Empty State
                    !results && React.createElement('div', {
                        style: {
                            textAlign: 'center',
                            padding: '3rem',
                            color: '#64748b'
                        }
                    },
                        React.createElement('p', null, 'Виберіть стратегію та запустіть бектест')
                    )
                )
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(React.createElement(CryptoBacktestPro));
    </script>

    <!-- Service Worker -->
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js').then(reg => {
                console.log('Service Worker registered');
            }).catch(err => console.log('SW registration failed'));
        }
    </script>
</body>
